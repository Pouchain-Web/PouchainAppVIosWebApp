<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PouchainApp</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- iOS Web App tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PouchainApp">
    <link rel="apple-touch-icon" href="favicon.png">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #FFFFFF !important;
            background-image: none !important;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-header">
            <img src="logo-pouchain.svg" alt="Pouchain" class="app-logo">
            <p>Documents Entreprise</p>
        </div>

        <div class="container" id="login-container">
            <form id="login-form">
                <div class="input-group">
                    <div class="input-row">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="input-row">
                        <input type="password" id="password" placeholder="Mot de passe" required>
                    </div>
                </div>

                <button type="submit" class="btn">Se connecter</button>
            </form>
            <p id="msg" style="margin-top: 15px; color: var(--danger-color); text-align: center; font-size: 14px;"></p>
        </div>

        <div class="container" id="force-password-container" style="display: none;">
            <p style="text-align: center; margin-bottom: 15px; font-size: 14px; color: #333;">Pour des raisons de
                sécurité, veuillez modifier votre mot de passe temporaire.</p>
            <form id="force-password-form">
                <div class="input-group">
                    <div class="input-row">
                        <input type="password" id="new-password" placeholder="Nouveau mot de passe" required
                            minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn">Mettre à jour</button>
            </form>
            <p id="force-msg"
                style="margin-top: 15px; color: var(--danger-color); text-align: center; font-size: 14px;"></p>
        </div>

        <div style="margin-top: 20px; margin-bottom: 80px; font-size: 14px; color: #8E8E93;">
            <p>Accès sécurisé via Supabase</p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/auth.js';
        import config from './js/config.js';
        import { updater } from './js/updater.js';

        // 0. Initialize Updater (Check for Live Updates)
        await updater.init();

        // --- Auto-Login Check ---
        async function checkSession() {
            if (updater.isUpdating()) {
                console.log("[Login] Update in progress, skipping auto-redirect.");
                return;
            }
            try {
                const session = await auth.getSession();
                if (session) {
                    console.log("Active session found, checking role...");
                    // Ensure role is in localStorage for the dashboard
                    let role = localStorage.getItem('pouchain_role');
                    if (!role) {
                        role = await auth.getUserRole();
                        localStorage.setItem('pouchain_role', role || 'user');
                    }
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.warn("Session check failed:", err);
            }
        }
        checkSession();

        // --- Redirect Check ---
        // If we land here with a recovery token (because Supabase redirect failed or defaulted)
        // we should manually redirect to the reset page.
        if (window.location.hash && (window.location.hash.includes('type=recovery') || window.location.hash.includes('access_token'))) {
            // Check if it's a recovery flow or invite flow
            console.log("Recovery/Invite token detected, redirecting to reset password page...");
            window.location.href = 'reset-password.html' + window.location.hash;
        }
        // --- iOS PWA Installation Guide ---
        function checkAndShowIOSInstallGuide() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

            if (isIOS && !isStandalone) {
                const guide = document.createElement('div');
                guide.id = 'ios-install-guide';
                guide.style.cssText = 'position:fixed;bottom:20px;left:15px;right:15px;background:rgba(28,28,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:white;border-radius:24px;padding:20px 24px;z-index:999999;box-shadow:0 8px 32px rgba(0,0,0,0.5);font-family:-apple-system,BlinkMacSystemFont,sans-serif;animation:slideUp 0.5s cubic-bezier(0.1, 1, 0.1, 1);';
                guide.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <img src="favicon.png" style="width:36px;height:36px;border-radius:8px;">
                            <div>
                                <div style="font-weight:700;font-size:15px;">Installer PouchainApp</div>
                                <div style="font-size:12px;color:#8E8E93;">Ajouter à l'écran d'accueil</div>
                            </div>
                        </div>
                        <button onclick="document.getElementById('ios-install-guide').remove()" style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
                    </div>
                    <div style="font-size:13px;line-height:1.6;color:#E5E5EA;">
                        1. Appuyez sur le bouton de partage <span style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;margin:0 2px;"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:#007AFF;"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"></path></svg></span> dans la barre de Safari.<br>
                        2. Faites défiler et sélectionnez <strong>Sur l'écran d'accueil</strong> ➕.
                    </div>
                    <style>
                        @keyframes slideUp {
                            from { transform: translateY(120%); opacity: 0; }
                            to { transform: translateY(0); opacity: 1; }
                        }
                    </style>
                `;
                document.body.appendChild(guide);
            }
        }
        checkAndShowIOSInstallGuide();

        const loginContainer = document.getElementById('login-container');
        const forcePasswordContainer = document.getElementById('force-password-container');
        const loginForm = document.getElementById('login-form');
        const forcePasswordForm = document.getElementById('force-password-form');
        const msg = document.getElementById('msg');
        const forceMsg = document.getElementById('force-msg');

        let pendingRole = null;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('#login-form button[type="submit"]');

            try {
                btn.disabled = true;
                btn.innerText = "Connexion...";
                msg.innerText = "";

                const { user, role } = await auth.login(email, password);

                if (password === '123456') {
                    // Force password change
                    pendingRole = role;
                    loginContainer.style.display = 'none';
                    forcePasswordContainer.style.display = 'block';
                } else {
                    // Store info for dashboard
                    localStorage.setItem('pouchain_role', role);

                    // Redirect
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error(error);
                msg.innerText = "Erreur : " + (error.message || "Identifiants incorrects");
                btn.disabled = false;
                btn.innerText = "Se connecter";
            }
        });

        forcePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const btn = document.querySelector('#force-password-form button[type="submit"]');

            try {
                btn.disabled = true;
                btn.innerText = "Mise à jour...";
                forceMsg.innerText = "";
                forceMsg.style.color = "var(--danger-color)";

                await auth.updatePassword(newPassword);

                forceMsg.style.color = "#34C759";
                forceMsg.innerText = "Mot de passe mis à jour ! Redirection...";

                // Store info for dashboard
                localStorage.setItem('pouchain_role', pendingRole || 'user');

                // Redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error(error);
                forceMsg.innerText = "Erreur : " + (error.message || "Impossible de mettre à jour");
                btn.disabled = false;
                btn.innerText = "Mettre à jour";
            }
        });
    </script>
    <div style="position: absolute; bottom: 15px; right: 15px; text-align: right; color: #8E8E93; font-size: 11px;">
        Pouchain App - <span class="app-version-display">v1.0.2</span> <br>
        <span style="color: #4cd964;">✓ Système à jour</span>
    </div>
</body>

</html>
