<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PouchainApp</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- iOS Web App tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PouchainApp">
    <link rel="apple-touch-icon" href="favicon.png">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #FFFFFF !important;
            background-image: none !important;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-header">
            <img src="logo-pouchain.svg" alt="Pouchain" class="app-logo">
            <p>Documents Entreprise</p>
        </div>

        <div class="container" id="login-container">
            <form id="login-form">
                <div class="input-group">
                    <div class="input-row">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="input-row">
                        <input type="password" id="password" placeholder="Mot de passe" required>
                    </div>
                </div>

                <button type="submit" class="btn">Se connecter</button>
            </form>
            <p id="msg" style="margin-top: 15px; color: var(--danger-color); text-align: center; font-size: 14px;"></p>
        </div>

        <div class="container" id="force-password-container" style="display: none;">
            <p style="text-align: center; margin-bottom: 15px; font-size: 14px; color: #333;">Pour des raisons de
                sécurité, veuillez modifier votre mot de passe temporaire.</p>
            <form id="force-password-form">
                <div class="input-group">
                    <div class="input-row">
                        <input type="password" id="new-password" placeholder="Nouveau mot de passe" required
                            minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn">Mettre à jour</button>
            </form>
            <p id="force-msg"
                style="margin-top: 15px; color: var(--danger-color); text-align: center; font-size: 14px;"></p>
        </div>

        <div style="margin-top: 20px; margin-bottom: 80px; font-size: 14px; color: #8E8E93;">
            <p>Accès sécurisé via Supabase</p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/auth.js';
        import config from './js/config.js';
        import { updater } from './js/updater.js';

        // 0. Initialize Updater (Check for Live Updates)
        await updater.init();

        // --- Auto-Login Check ---
        async function checkSession() {
            if (updater.isUpdating()) {
                console.log("[Login] Update in progress, skipping auto-redirect.");
                return;
            }
            try {
                const session = await auth.getSession();
                if (session) {
                    console.log("Active session found, checking role...");
                    // Ensure role is in localStorage for the dashboard
                    let role = localStorage.getItem('pouchain_role');
                    if (!role) {
                        role = await auth.getUserRole();
                        localStorage.setItem('pouchain_role', role || 'user');
                    }
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.warn("Session check failed:", err);
            }
        }
        checkSession();

        // --- Redirect Check ---
        // If we land here with a recovery token (because Supabase redirect failed or defaulted)
        // we should manually redirect to the reset page.
        if (window.location.hash && (window.location.hash.includes('type=recovery') || window.location.hash.includes('access_token'))) {
            // Check if it's a recovery flow or invite flow
            console.log("Recovery/Invite token detected, redirecting to reset password page...");
            window.location.href = 'reset-password.html' + window.location.hash;
        }
        // --- iOS PWA Installation Guide (Forcé) ---
        function checkAndShowIOSInstallGuide() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

            if (isIOS && !isStandalone) {
                // Désactiver tous les champs de saisie pour empêcher l'ouverture du clavier iOS
                document.querySelectorAll('input').forEach(input => {
                    input.disabled = true;
                });

                const guide = document.createElement('div');
                guide.id = 'ios-install-guide';
                guide.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(28,28,30,0.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);color:white;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif;animation:fadeIn 0.4s ease-out;';
                guide.innerHTML = `
                    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);padding:35px 25px;border-radius:28px;width:100%;max-width:340px;text-align:center;box-shadow:0 15px 35px rgba(0,0,0,0.4);animation:scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);">
                        <img src="favicon.png" style="width:70px;height:70px;border-radius:18px;margin-bottom:20px;box-shadow:0 8px 16px rgba(0,0,0,0.3);">
                        <h2 style="margin:0 0 10px 0;font-size:22px;font-weight:800;color:#fff;">Installation requise</h2>
                        <p style="margin:0 0 25px 0;font-size:14px;color:#8E8E93;line-height:1.5;">
                            Pour accéder à l'application sur votre iPhone, vous devez l'ajouter à votre écran d'accueil.
                        </p>
                        <div style="text-align:left;background:rgba(255,255,255,0.05);padding:18px;border-radius:18px;font-size:13.5px;line-height:1.6;color:#E5E5EA;">
                            <div style="margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;">
                                <span style="background:var(--primary-color,#FF3B30);color:white;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:2px;">1</span>
                                <span>Appuyez sur le bouton de partage <span style="background:rgba(255,255,255,0.15);padding:2px 6px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;margin:0 2px;vertical-align:middle;"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:#0A84FF;"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"></path></svg></span> dans la barre du bas de Safari.</span>
                            </div>
                            <div style="display:flex;align-items:flex-start;gap:8px;">
                                <span style="background:var(--primary-color,#FF3B30);color:white;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:2px;">2</span>
                                <span>Faites défiler vers le bas et sélectionnez <strong>Sur l'écran d'accueil</strong> ➕.</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="position:absolute;bottom:40px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:bounce 1.5s infinite;">
                        <span style="font-size:12px;color:#8E8E93;font-weight:600;letter-spacing:0.5px;">Appuyez ici en bas</span>
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" style="color:#0A84FF;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                        </svg>
                    </div>

                    <style>
                        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                        @keyframes bounce {
                            0%, 100% { transform: translateY(0); }
                            50% { transform: translateY(10px); }
                        }
                    </style>
                `;
                document.body.appendChild(guide);
            }
        }
        checkAndShowIOSInstallGuide();

        const loginContainer = document.getElementById('login-container');
        const forcePasswordContainer = document.getElementById('force-password-container');
        const loginForm = document.getElementById('login-form');
        const forcePasswordForm = document.getElementById('force-password-form');
        const msg = document.getElementById('msg');
        const forceMsg = document.getElementById('force-msg');

        let pendingRole = null;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('#login-form button[type="submit"]');

            try {
                btn.disabled = true;
                btn.innerText = "Connexion...";
                msg.innerText = "";

                const { user, role } = await auth.login(email, password);

                if (password === '123456') {
                    // Force password change
                    pendingRole = role;
                    loginContainer.style.display = 'none';
                    forcePasswordContainer.style.display = 'block';
                } else {
                    // Store info for dashboard
                    localStorage.setItem('pouchain_role', role);

                    // Redirect
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error(error);
                msg.innerText = "Erreur : " + (error.message || "Identifiants incorrects");
                btn.disabled = false;
                btn.innerText = "Se connecter";
            }
        });

        forcePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const btn = document.querySelector('#force-password-form button[type="submit"]');

            try {
                btn.disabled = true;
                btn.innerText = "Mise à jour...";
                forceMsg.innerText = "";
                forceMsg.style.color = "var(--danger-color)";

                await auth.updatePassword(newPassword);

                forceMsg.style.color = "#34C759";
                forceMsg.innerText = "Mot de passe mis à jour ! Redirection...";

                // Store info for dashboard
                localStorage.setItem('pouchain_role', pendingRole || 'user');

                // Redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error(error);
                forceMsg.innerText = "Erreur : " + (error.message || "Impossible de mettre à jour");
                btn.disabled = false;
                btn.innerText = "Mettre à jour";
            }
        });
    </script>
    <div style="position: absolute; bottom: 15px; right: 15px; text-align: right; color: #8E8E93; font-size: 11px;">
        Pouchain App - <span class="app-version-display">v1.0.2</span> <br>
        <span style="color: #4cd964;">✓ Système à jour</span>
    </div>
</body>

</html>
